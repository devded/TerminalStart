<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>browserpad // ~/CSir.info</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />

    <style>
        :root {
            --color-bg: #09090b;
            --color-fg: #fafafa;
            --color-muted: #71717a;
            --color-border: #27272a;
            --color-accent: #a78bfa;
            --color-hover: #18181b;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            background: var(--color-bg);
            color: var(--color-fg);
            font-family: "JetBrains Mono", monospace;
            overflow: hidden;
        }

        /* ── Layout ── */
        .pad-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 820px;
            margin: 0 auto;
            padding: 1rem;
            gap: 0;
        }

        /* ── Title bar ── */
        .pad-titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: -0.6rem;
            z-index: 20;
            pointer-events: none;
        }

        .pad-title {
            background: var(--color-bg);
            padding: 0 0.5rem;
            color: var(--color-muted);
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: lowercase;
            pointer-events: auto;
        }

        .pad-title a {
            color: inherit;
            text-decoration: none;
            transition: color 200ms;
        }

        .pad-title a:hover {
            color: var(--color-accent);
        }

        .pad-meta {
            background: var(--color-bg);
            padding: 0 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            pointer-events: auto;
        }

        .pad-stat {
            font-size: 0.7rem;
            color: var(--color-muted);
            opacity: 0.55;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .pad-saved {
            font-size: 0.7rem;
            color: var(--color-accent);
            opacity: 0;
            letter-spacing: 0.04em;
            transition: opacity 400ms ease;
            white-space: nowrap;
        }

        .pad-saved.visible {
            opacity: 0.8;
        }

        /* ── Main bordered box ── */
        .pad-box {
            flex: 1;
            border: 1px solid var(--color-border);
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
            transition: border-color 200ms ease;
        }

        .pad-box:focus-within {
            border-color: color-mix(in srgb, var(--color-accent) 40%, var(--color-border));
        }

        /* SVG glow border — same technique as index.html widgets */
        .pad-box > svg {
            position: absolute;
            top: -1px;
            left: -1px;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: visible;
        }

        .pad-glow-border {
            fill: none;
            stroke: var(--color-accent);
            stroke-width: 1;
            stroke-dashoffset: var(--perimeter, 9999);
            opacity: 0;
            transition: opacity 0.3s ease, stroke-dashoffset 0s linear 0.3s;
        }

        .pad-box:focus-within .pad-glow-border {
            stroke-dashoffset: 0;
            opacity: 1;
            transition: stroke-dashoffset 0.9s ease-out, opacity 0.1s ease;
        }

        /* ── Textarea ── */
        .pad-textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: var(--color-fg);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.9rem;
            line-height: 1.75;
            padding: 1.25rem 1.5rem;
            caret-color: var(--color-accent);
            overflow-y: auto;
            min-height: 0;
        }

        .pad-textarea::placeholder {
            color: var(--color-muted);
            opacity: 0.35;
        }

        .pad-textarea::-webkit-scrollbar { width: 4px; }
        .pad-textarea::-webkit-scrollbar-track { background: var(--color-bg); }
        .pad-textarea::-webkit-scrollbar-thumb { background: var(--color-border); }
        .pad-textarea::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }

        /* ── Status bar ── */
        .pad-statusbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 1rem;
            border-top: 1px solid var(--color-border);
            background: var(--color-hover);
            font-size: 0.65rem;
            color: var(--color-muted);
            opacity: 0.6;
            gap: 1rem;
            flex-shrink: 0;
        }

        .pad-statusbar-left, .pad-statusbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .pad-kbd {
            opacity: 0.5;
            letter-spacing: 0.03em;
        }

        /* ── Document tabs ── */
        .pad-tabs {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-hover);
            padding: 0 0.5rem;
            gap: 0.25rem;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .pad-tabs::-webkit-scrollbar { height: 2px; }
        .pad-tabs::-webkit-scrollbar-track { background: transparent; }
        .pad-tabs::-webkit-scrollbar-thumb { background: var(--color-border); }

        .pad-tab {
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--color-muted);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.68rem;
            padding: 0.4rem 0.6rem;
            cursor: pointer;
            white-space: nowrap;
            transition: color 150ms, border-color 150ms;
            opacity: 0.5;
            position: relative;
        }

        .pad-tab:hover {
            color: var(--color-fg);
            opacity: 1;
        }

        .pad-tab.active {
            color: var(--color-accent);
            border-bottom-color: var(--color-accent);
            opacity: 1;
        }

        .pad-tab-close {
            display: inline-block;
            margin-left: 0.35rem;
            opacity: 0;
            font-size: 0.6rem;
            line-height: 1;
            vertical-align: middle;
            transition: opacity 150ms;
        }

        .pad-tab:hover .pad-tab-close {
            opacity: 0.6;
        }

        .pad-tab-close:hover {
            opacity: 1 !important;
            color: var(--color-accent);
        }

        .pad-tab-new {
            background: transparent;
            border: none;
            color: var(--color-muted);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.75rem;
            padding: 0.4rem 0.5rem;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 150ms, color 150ms;
            align-self: center;
        }

        .pad-tab-new:hover {
            opacity: 1;
            color: var(--color-accent);
        }
    </style>
</head>

<body>
    <div class="pad-shell">
        <!-- nav.sh widget -->
        <div class="widget widget-rounded widget-glow" id="nav-widget" style="flex-shrink:0;margin-bottom:0.5rem">
            <svg style="position:absolute;top:-1px;left:-1px;width:100%;height:100%;pointer-events:none;z-index:10;overflow:visible">
                <path class="widget-glow-border" id="nav-glow-path" fill="none" stroke="var(--color-accent)" stroke-width="1" />
            </svg>
            <div class="widget-title-bar">
                <div class="widget-title">nav.sh</div>
            </div>
            <div style="padding:0.25rem 1rem 0.45rem;display:flex;align-items:center;gap:1.25rem">
                <a href="index.html" class="nav-link">
                    <span style="color:var(--color-accent);opacity:0.6">[←]</span> dashboard
                </a>
                <a href="routine.html" class="nav-link">
                    <span style="color:var(--color-accent);opacity:0.6">[→]</span> routine.sh
                </a>
                <a href="browserpad.html" class="nav-link current">
                    <span style="color:var(--color-accent)">&gt;</span> browserpad
                </a>
            </div>
        </div>

        <!-- Writing area wrapper -->
        <div style="flex:1;min-height:0;display:flex;flex-direction:column">
            <!-- Title bar (floats on pad-box border) -->
            <div class="pad-titlebar">
                <div class="pad-title">browserpad.txt</div>
                <div class="pad-meta">
                    <span class="pad-saved" id="saved-indicator">// saved</span>
                    <span class="pad-stat" id="stat-display">0 words &middot; 0 chars</span>
                </div>
            </div>

            <!-- Bordered writing area -->
            <div class="pad-box" id="pad-box" style="flex:1;min-height:0">
            <svg id="pad-svg" aria-hidden="true">
                <path class="pad-glow-border" id="pad-glow-path" />
            </svg>

            <!-- Document tabs -->
            <div class="pad-tabs" id="pad-tabs"></div>

            <!-- The textarea -->
            <textarea
                class="pad-textarea"
                id="pad-textarea"
                spellcheck="true"
                autocorrect="on"
                placeholder="start writing... everything is saved automatically."
            ></textarea>

            <!-- Status bar -->
            <div class="pad-statusbar">
                <div class="pad-statusbar-left">
                    <span class="pad-kbd">ctrl+n &mdash; new doc</span>
                    <span class="pad-kbd">ctrl+w &mdash; close doc</span>
                    <span class="pad-kbd">ctrl+d &mdash; download</span>
                </div>
                <div class="pad-statusbar-right">
                    <span id="cursor-pos">ln 1, col 1</span>
                </div>
            </div>
        </div>
        </div><!-- end writing area wrapper -->
    </div><!-- end pad-shell -->

    <script>
        const STORAGE_KEY = 'browserpad_docs';
        const ACTIVE_KEY  = 'browserpad_active';

        const textarea   = document.getElementById('pad-textarea');
        const tabsEl     = document.getElementById('pad-tabs');
        const statEl     = document.getElementById('stat-display');
        const savedEl    = document.getElementById('saved-indicator');
        const cursorEl   = document.getElementById('cursor-pos');

        // ── State ──────────────────────────────────────────────
        let docs   = [];   // [{ id, name, content }]
        let active = null; // id of active doc
        let saveTimer = null;
        let savedFadeTimer = null;

        // ── Persistence ────────────────────────────────────────
        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                docs = raw ? JSON.parse(raw) : [];
            } catch (_) {
                docs = [];
            }
            if (!docs.length) {
                docs = [makeDoc()];
            }
            const savedActive = localStorage.getItem(ACTIVE_KEY);
            active = docs.find(d => d.id === savedActive) ? savedActive : docs[0].id;
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
            localStorage.setItem(ACTIVE_KEY, active);
        }

        function makeDoc(name) {
            const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            return { id, name: name || 'untitled', content: '' };
        }

        // ── Tabs ───────────────────────────────────────────────
        function renderTabs() {
            tabsEl.innerHTML = '';
            docs.forEach(doc => {
                const btn = document.createElement('button');
                btn.className = 'pad-tab' + (doc.id === active ? ' active' : '');
                btn.dataset.id = doc.id;

                const nameSpan = document.createElement('span');
                nameSpan.textContent = doc.name;
                nameSpan.style.cssText = 'cursor:text;outline:none';

                // Inline rename on double-click
                nameSpan.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    nameSpan.contentEditable = 'true';
                    nameSpan.focus();
                    const range = document.createRange();
                    range.selectNodeContents(nameSpan);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                });
                nameSpan.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); nameSpan.blur(); }
                });
                nameSpan.addEventListener('blur', () => {
                    nameSpan.contentEditable = 'false';
                    const newName = nameSpan.textContent.trim() || 'untitled';
                    doc.name = newName;
                    saveState();
                });

                const closeBtn = document.createElement('span');
                closeBtn.className = 'pad-tab-close';
                closeBtn.textContent = '×';
                closeBtn.title = 'close';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeDoc(doc.id);
                });

                btn.appendChild(nameSpan);
                btn.appendChild(closeBtn);
                btn.addEventListener('click', () => switchDoc(doc.id));
                tabsEl.appendChild(btn);
            });

            // + new tab button
            const newBtn = document.createElement('button');
            newBtn.className = 'pad-tab-new';
            newBtn.textContent = '+';
            newBtn.title = 'new document (ctrl+n)';
            newBtn.addEventListener('click', newDoc);
            tabsEl.appendChild(newBtn);
        }

        // ── Document operations ────────────────────────────────
        function switchDoc(id) {
            // Save current textarea content into current doc before switching
            const cur = docs.find(d => d.id === active);
            if (cur) cur.content = textarea.value;
            saveState();

            active = id;
            const doc = docs.find(d => d.id === active);
            textarea.value = doc ? doc.content : '';
            renderTabs();
            updateStats();
            textarea.focus();
            localStorage.setItem(ACTIVE_KEY, active);
        }

        function newDoc() {
            const cur = docs.find(d => d.id === active);
            if (cur) cur.content = textarea.value;
            const doc = makeDoc();
            docs.push(doc);
            active = doc.id;
            saveState();
            renderTabs();
            textarea.value = '';
            updateStats();
            textarea.focus();
        }

        function closeDoc(id) {
            if (docs.length === 1) {
                // Clear content but keep the doc
                docs[0].content = '';
                textarea.value = '';
                saveState();
                updateStats();
                return;
            }
            const idx = docs.findIndex(d => d.id === id);
            docs.splice(idx, 1);
            if (active === id) {
                active = docs[Math.max(0, idx - 1)].id;
                const doc = docs.find(d => d.id === active);
                textarea.value = doc ? doc.content : '';
            }
            saveState();
            renderTabs();
            updateStats();
        }

        // ── Auto-save ──────────────────────────────────────────
        function triggerSave() {
            const doc = docs.find(d => d.id === active);
            if (doc) doc.content = textarea.value;
            saveState();

            // Show "// saved" indicator
            savedEl.classList.add('visible');
            clearTimeout(savedFadeTimer);
            savedFadeTimer = setTimeout(() => savedEl.classList.remove('visible'), 1500);
        }

        function scheduleAutosave() {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(triggerSave, 400); // 400 ms debounce
        }

        // ── Stats ──────────────────────────────────────────────
        function updateStats() {
            const text = textarea.value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const chars = text.length;
            statEl.textContent = `${words} word${words !== 1 ? 's' : ''} \u00b7 ${chars} char${chars !== 1 ? 's' : ''}`;
        }

        function updateCursor() {
            const val = textarea.value;
            const pos = textarea.selectionStart;
            const lines = val.slice(0, pos).split('\n');
            const ln = lines.length;
            const col = lines[lines.length - 1].length + 1;
            cursorEl.textContent = `ln ${ln}, col ${col}`;
        }

        // ── Glow borders ───────────────────────────────────────
        function updateGlowBorder() {
            // pad-box border (gap under the floating title)
            const box  = document.getElementById('pad-box');
            const path = document.getElementById('pad-glow-path');
            const svg  = document.getElementById('pad-svg');
            if (box && path && svg) {
                const w = box.offsetWidth;
                const h = box.offsetHeight;
                const titleEl = document.querySelector('.pad-title');
                const boxRect  = box.getBoundingClientRect();
                const titleRect = titleEl ? titleEl.getBoundingClientRect() : null;
                const sx = titleRect ? (titleRect.right - boxRect.left + 8) : 160;
                const d = `M${sx},0.5 L${w - 0.5},0.5 L${w - 0.5},${h - 0.5} L0.5,${h - 0.5} L0.5,0.5 L${sx},0.5`;
                path.setAttribute('d', d);
                const perimeter = 2 * w + 2 * h;
                path.setAttribute('stroke-dasharray', perimeter);
                path.style.setProperty('--perimeter', perimeter);
                svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            }

            // nav widget border (gap under "nav.sh" title)
            const nav  = document.getElementById('nav-widget');
            const navPath = document.getElementById('nav-glow-path');
            if (nav && navPath) {
                const w = nav.offsetWidth;
                const h = nav.offsetHeight;
                const titleEl = nav.querySelector('.widget-title');
                const sx = titleEl ? titleEl.offsetWidth + 24 : 80;
                const d = `M${sx},0.5 L${w - 0.5},0.5 L${w - 0.5},${h - 0.5} L0.5,${h - 0.5} L0.5,0.5 L${sx},0.5`;
                navPath.setAttribute('d', d);
                const perimeter = 2 * w + 2 * h;
                navPath.setAttribute('stroke-dasharray', perimeter);
                navPath.style.setProperty('--perimeter', perimeter);
                nav.querySelector('svg').setAttribute('viewBox', `0 0 ${w} ${h}`);
            }
        }

        // ── Keyboard shortcuts ─────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                newDoc();
            }
            if (e.ctrlKey && e.key === 'w') {
                e.preventDefault();
                closeDoc(active);
            }
            if (e.ctrlKey && e.key === 'd') {
                e.preventDefault();
                downloadActive();
            }
            // Tab key → insert spaces instead of losing focus
            if (e.key === 'Tab' && document.activeElement === textarea) {
                e.preventDefault();
                const start = textarea.selectionStart;
                const end   = textarea.selectionEnd;
                textarea.value = textarea.value.slice(0, start) + '    ' + textarea.value.slice(end);
                textarea.selectionStart = textarea.selectionEnd = start + 4;
                scheduleAutosave();
            }
        });

        // ── Download ───────────────────────────────────────────
        function downloadActive() {
            const doc = docs.find(d => d.id === active);
            if (!doc) return;
            const blob = new Blob([doc.content], { type: 'text/plain' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url;
            a.download = (doc.name || 'untitled') + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ── Event listeners ────────────────────────────────────
        textarea.addEventListener('input', () => {
            updateStats();
            scheduleAutosave();
        });

        textarea.addEventListener('keyup', updateCursor);
        textarea.addEventListener('click', updateCursor);

        // Save before page unload
        window.addEventListener('beforeunload', () => {
            const doc = docs.find(d => d.id === active);
            if (doc) doc.content = textarea.value;
            saveState();
        });

        window.addEventListener('resize', updateGlowBorder);

        // ── Init ───────────────────────────────────────────────
        loadState();
        renderTabs();

        const activeDoc = docs.find(d => d.id === active);
        textarea.value = activeDoc ? activeDoc.content : '';

        updateStats();
        updateCursor();
        setTimeout(updateGlowBorder, 100);
        textarea.focus();
    </script>
</body>

</html>
