<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>~/routine.sh</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>

    <style>
        /* ── Day Tabs ── */
        .day-tab {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-muted);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.72rem;
            padding: 3px 10px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .day-tab:hover {
            border-color: var(--color-accent);
            color: var(--color-fg);
        }

        .day-tab.active {
            border-color: var(--color-accent);
            color: var(--color-accent);
            text-shadow: 0 0 8px var(--color-accent);
            box-shadow: 0 0 10px rgba(167, 139, 250, 0.15);
        }

        .day-tab.has-class::after {
            content: '✦';
            color: var(--color-accent);
            margin-left: 4px;
            font-size: 0.5rem;
            vertical-align: middle;
            opacity: 0.7;
        }

        /* ── AB Toggle ── */
        .ab-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-muted);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.72rem;
            padding: 3px 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ab-btn:first-child { border-radius: 0; border-right: none; }
        .ab-btn:last-child  { border-radius: 0; }

        .ab-btn.active {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: rgba(167, 139, 250, 0.08);
            text-shadow: 0 0 6px var(--color-accent);
        }

        /* ── Block Entries ── */
        .block-entry {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 11px 12px;
            border-bottom: 1px solid var(--color-border);
            border-left: 2px solid transparent;
            transition: background 0.15s;
        }

        .block-entry:last-child { border-bottom: none; }

        .block-entry:hover { background: var(--color-hover); }

        .block-entry.block-current {
            background: rgba(167, 139, 250, 0.06);
        }

        .block-entry.block-current .block-time {
            color: var(--color-accent);
        }

        .block-now-badge {
            font-size: 0.6rem;
            color: var(--color-accent);
            border: 1px solid var(--color-accent);
            padding: 1px 5px;
            text-transform: lowercase;
            letter-spacing: 0.04em;
            animation: now-pulse 2s ease-in-out infinite;
        }

        @keyframes now-pulse {
            0%, 100% { opacity: 0.9; }
            50%       { opacity: 0.35; }
        }

        .block-entry[data-type="freelance"] { border-left-color: #4ade80; }
        .block-entry[data-type="academic"]  { border-left-color: #818cf8; }
        .block-entry[data-type="skill"]     { border-left-color: #fb923c; }
        .block-entry[data-type="library"]   { border-left-color: #fbbf24; }
        .block-entry[data-type="class"]     { border-left-color: #c084fc; }
        .block-entry[data-type="personal"]  { border-left-color: #52525b; }

        .block-time {
            width: 108px;
            min-width: 108px;
            color: var(--color-muted);
            font-size: 0.7rem;
            padding-top: 2px;
            line-height: 1.5;
        }

        .block-icon {
            width: 18px;
            min-width: 18px;
            font-size: 0.88rem;
            padding-top: 2px;
            text-align: center;
        }

        .block-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .block-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-name {
            color: var(--color-fg);
            font-size: 0.82rem;
            font-weight: bold;
            text-transform: lowercase;
            letter-spacing: 0.02em;
        }

        .block-tag {
            font-size: 0.65rem;
            padding: 1px 5px;
            border: 1px solid;
            font-weight: normal;
            text-transform: lowercase;
            flex-shrink: 0;
        }

        .tag-freelance { color: #4ade80; border-color: rgba(74, 222, 128, 0.2); }
        .tag-academic  { color: #818cf8; border-color: rgba(129, 140, 248, 0.2); }
        .tag-skill     { color: #fb923c; border-color: rgba(251, 146, 60, 0.2); }
        .tag-library   { color: #fbbf24; border-color: rgba(251, 191, 36, 0.2); }
        .tag-class     { color: #c084fc; border-color: rgba(192, 132, 252, 0.2); }
        .tag-personal  { color: #6b7280; border-color: rgba(107, 114, 128, 0.2); }

        .block-option {
            color: var(--color-muted);
            font-size: 0.76rem;
            line-height: 1.55;
            display: flex;
            gap: 6px;
            align-items: baseline;
        }

        .opt-prompt {
            color: var(--color-accent);
            opacity: 0.6;
            font-size: 0.72rem;
            flex-shrink: 0;
        }

        /* ── Eval Items ── */
        .eval-item {
            display: grid;
            grid-template-columns: 18px 1fr auto;
            gap: 8px;
            align-items: start;
            padding: 7px 12px;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.76rem;
            transition: background 0.15s;
        }

        .eval-item:last-child { border-bottom: none; }
        .eval-item:hover { background: var(--color-hover); }

        .eval-icon { font-size: 0.82rem; padding-top: 1px; }

        .eval-q {
            color: var(--color-muted);
            line-height: 1.45;
        }

        .eval-cat {
            color: var(--color-muted);
            opacity: 0.35;
            font-size: 0.65rem;
            text-align: right;
            white-space: nowrap;
            padding-top: 2px;
        }

        /* ── Rules ── */
        .rule-item {
            padding: 8px 12px;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.76rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background 0.15s;
        }

        .rule-item:last-child { border-bottom: none; }
        .rule-item:hover { background: var(--color-hover); }

        .rule-if {
            color: var(--color-muted);
            display: flex;
            gap: 7px;
            align-items: baseline;
        }

        .rule-if::before {
            content: 'if';
            color: var(--color-accent);
            opacity: 0.7;
            flex-shrink: 0;
            font-weight: bold;
        }

        .rule-do {
            color: var(--color-fg);
            opacity: 0.8;
            display: flex;
            gap: 7px;
            align-items: baseline;
            padding-left: 18px;
        }

        .rule-do::before {
            content: '→';
            color: #4ade80;
            flex-shrink: 0;
        }

        /* ── Legend ── */
        .legend-pip {
            width: 12px;
            height: 2px;
            border-radius: 1px;
            display: inline-block;
            flex-shrink: 0;
        }

        /* ── Nav link ── */
        .nav-link {
            color: var(--color-muted);
            font-size: 0.75rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover { color: var(--color-fg); }

        .nav-link.current {
            color: var(--color-accent);
            text-shadow: 0 0 8px var(--color-accent);
        }
    </style>
</head>

<body class="min-h-screen w-full p-2 text-sm bg-[var(--color-bg)]">
    <div class="w-full px-2 py-4 max-w-[900px] mx-auto flex flex-col gap-3">

        <!-- Slim Horizontal Nav Bar -->
        <div class="flex items-center justify-between px-2 shrink-0 font-mono text-xs" style="border-bottom: 1px solid var(--color-border); padding-bottom: 0.35rem;">
            <span id="attribution" class="text-[var(--color-muted)] opacity-30 hover:opacity-60 cursor-default transition-opacity duration-200">
                <span id="attribution-text">~/CSir.info</span>
            </span>
            <nav class="flex items-center gap-4">
                <a href="index.html" class="nav-link"><span style="color: var(--color-accent); opacity: 0.6">[→]</span> dashboard</a>
                <a href="routine.html" class="nav-link current"><span style="color: var(--color-accent)">&gt;</span> routine.sh</a>
                <a href="browserpad.html" class="nav-link"><span style="color: var(--color-accent); opacity: 0.6">[→]</span> browserpad</a>
                <a href="feed.html" class="nav-link"><span style="color: var(--color-accent); opacity: 0.6">[→]</span> feed.rss</a>
                <button id="theme-toggle" class="nav-link" style="background:none;border:none;cursor:pointer;padding:0;">[light]</button>
            </nav>
        </div>

        <!-- Main Routine Widget -->
        <div class="widget widget-rounded widget-glow">
            <svg class="absolute top-[-1px] left-[-1px] w-full h-full pointer-events-none z-10 overflow-visible">
                <path class="widget-glow-border" fill="none" stroke="var(--color-accent)" stroke-width="1" />
            </svg>
            <div class="widget-title-bar">
                <div class="widget-title">routine.sh</div>
            </div>
            <div class="widget-content px-0 py-0">

                <!-- Day Tabs -->
                <div class="flex gap-1.5 flex-wrap px-3 pt-3 pb-3" id="day-tabs"></div>

                <!-- Meta -->
                <div class="flex gap-5 flex-wrap px-3 pb-3 border-b border-[var(--color-border)]"
                    id="routine-meta"
                    style="font-size:0.72rem; color: var(--color-muted);">
                </div>

                <!-- Legend -->
                <div class="flex gap-4 flex-wrap px-3 py-2.5 border-b border-[var(--color-border)]"
                    id="type-legend"
                    style="font-size:0.68rem;">
                </div>

                <!-- Controls Row -->
                <div class="flex items-center justify-between px-3 py-2">
                    <div id="day-label" style="font-size:0.72rem; color: var(--color-muted);"></div>
                    <div class="flex" id="ab-toggle">
                        <button class="ab-btn active" id="btn-a" onclick="setAB('a')">[A]</button>
                        <button class="ab-btn" id="btn-b" onclick="setAB('b')">[B]</button>
                    </div>
                </div>

                <!-- Blocks -->
                <div id="blocks-list"></div>

            </div>
        </div>

        <!-- Bottom Grid: Eval + Rules -->
        <div class="grid grid-cols-2 gap-3">

            <!-- Eval Widget -->
            <div class="widget widget-rounded widget-glow">
                <svg class="absolute top-[-1px] left-[-1px] w-full h-full pointer-events-none z-10 overflow-visible">
                    <path class="widget-glow-border" fill="none" stroke="var(--color-accent)" stroke-width="1" />
                </svg>
                <div class="widget-title-bar">
                    <div class="widget-title">eval.log</div>
                </div>
                <div class="widget-content px-0 py-0 pt-1">
                    <div id="eval-list"></div>
                </div>
            </div>

            <!-- Rules Widget -->
            <div class="widget widget-rounded widget-glow">
                <svg class="absolute top-[-1px] left-[-1px] w-full h-full pointer-events-none z-10 overflow-visible">
                    <path class="widget-glow-border" fill="none" stroke="var(--color-accent)" stroke-width="1" />
                </svg>
                <div class="widget-title-bar">
                    <div class="widget-title">anti_spiral.rules</div>
                </div>
                <div class="widget-content px-0 py-0 pt-1">
                    <div id="rules-list"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- SVG perimeter glow — same script pattern as index.html -->
    <script>
        function updateGlowBorders() {
            document.querySelectorAll('.widget-glow').forEach(widget => {
                const svg = widget.querySelector('svg');
                const path = widget.querySelector('.widget-glow-border');
                if (!svg || !path) return;
                const w = widget.offsetWidth;
                const h = widget.offsetHeight;
                const r = parseFloat(getComputedStyle(widget).borderRadius) || 0;
                const perimeter = 2 * (w + h) - 8 * r + 2 * Math.PI * r;
                path.setAttribute('d', `M ${r},0 H ${w - r} Q ${w},0 ${w},${r} V ${h - r} Q ${w},${h} ${w - r},${h} H ${r} Q 0,${h} 0,${h - r} V ${r} Q 0,0 ${r},0 Z`);
                path.style.setProperty('--perimeter', perimeter);
                path.style.strokeDasharray = perimeter;
            });
        }
        window.addEventListener('resize', updateGlowBorders);
    </script>

    <script>
        const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const DAY_NAMES = { Mon: 'monday', Tue: 'tuesday', Wed: 'wednesday', Thu: 'thursday', Fri: 'friday', Sat: 'saturday', Sun: 'sunday' };

        let DATA = null;
        let currentDay = 'Mon';
        let currentAB = 'a';

        function getToday() {
            return DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
        }

        function setDay(day) {
            currentDay = day;
            renderTabs();
            renderDayLabel();
            renderBlocks();
        }

        function setAB(ab) {
            currentAB = ab;
            document.getElementById('btn-a').classList.toggle('active', ab === 'a');
            document.getElementById('btn-b').classList.toggle('active', ab === 'b');
            renderBlocks();
        }

        function renderTabs() {
            document.getElementById('day-tabs').innerHTML = DAYS.map(day => {
                const isClass = DATA.meta.class_days.includes(day);
                const isActive = day === currentDay;
                return `<button class="day-tab${isActive ? ' active' : ''}${isClass ? ' has-class' : ''}" onclick="setDay('${day}')">${day.toLowerCase()}</button>`;
            }).join('');
        }

        function renderMeta() {
            document.getElementById('routine-meta').innerHTML = `
                <span><span style="opacity:0.45">wake</span>&nbsp;&nbsp;<span style="color:var(--color-fg)">${DATA.meta.wake}</span></span>
                <span><span style="opacity:0.45">sleep</span>&nbsp;&nbsp;<span style="color:var(--color-fg)">${DATA.meta.sleep}</span></span>
                <span><span style="opacity:0.45">class days</span>&nbsp;&nbsp;<span style="color:var(--color-fg)">${DATA.meta.class_days.map(d => d.toLowerCase()).join(' · ')}</span></span>
                <span><span style="opacity:0.45">class time</span>&nbsp;&nbsp;<span style="color:var(--color-fg)">${DATA.meta.class_time}</span></span>
            `;
        }

        function renderLegend() {
            document.getElementById('type-legend').innerHTML = Object.entries(DATA.block_types).map(([key, val]) => `
                <div style="display:flex;align-items:center;gap:5px;color:var(--color-muted)">
                    <span class="legend-pip" style="background:${val.color}"></span>
                    <span>${key}</span>
                </div>
            `).join('');
        }

        function renderDayLabel() {
            const isClass = DATA.meta.class_days.includes(currentDay);
            document.getElementById('day-label').innerHTML =
                `// <span style="color:var(--color-fg)">${DAY_NAMES[currentDay]}</span>${isClass ? `&nbsp;<span style="color:var(--color-accent);font-size:0.65rem;opacity:0.7">· class day</span>` : ''}`;
        }

        // times 00:00–09:59 are post-midnight and belong to the "next day" in this schedule
        function timeToMin(str) {
            const [h, m] = str.split(':').map(Number);
            return h < 10 ? h * 60 + m + 1440 : h * 60 + m;
        }

        function nowMin() {
            const now = new Date();
            const m = now.getHours() * 60 + now.getMinutes();
            return now.getHours() < 10 ? m + 1440 : m;
        }

        function isCurrentBlock(timeRange) {
            const [s, e] = timeRange.split('–').map(t => timeToMin(t.trim()));
            const now = nowMin();
            return now >= s && now < e;
        }

        function renderBlocks() {
            const blocks = DATA.routine[currentDay];
            document.getElementById('blocks-list').innerHTML = blocks.map(block => {
                const opt = block[currentAB];
                const current = isCurrentBlock(block.time);
                return `
                    <div class="block-entry${current ? ' block-current' : ''}" data-type="${opt.type}">
                        <div class="block-time">${block.time}</div>
                        <div class="block-icon">${block.icon}</div>
                        <div class="block-body">
                            <div class="block-header">
                                <span class="block-name">${block.block.toLowerCase()}</span>
                                <span class="block-tag tag-${opt.type}">${opt.type}</span>
                                ${current ? '<span class="block-now-badge">now</span>' : ''}
                            </div>
                            <div class="block-option">
                                <span class="opt-prompt">&gt;</span>
                                <span>${opt.task}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEval() {
            document.getElementById('eval-list').innerHTML = DATA.evaluation.map(e => `
                <div class="eval-item">
                    <span class="eval-icon">${e.icon}</span>
                    <span class="eval-q">${e.question}</span>
                    <span class="eval-cat">${e.category.toLowerCase()}</span>
                </div>
            `).join('');
        }

        function renderRules() {
            document.getElementById('rules-list').innerHTML = DATA.anti_spiral_rules.map(r => `
                <div class="rule-item">
                    <div class="rule-if">${r.trigger}</div>
                    <div class="rule-do">${r.action}</div>
                </div>
            `).join('');
        }

        // Re-check current block every minute
        setInterval(() => { if (DATA) renderBlocks(); }, 60000);

        // Load routine.json then init
        fetch('routine.json')
            .then(res => res.json())
            .then(data => {
                DATA = data;
                currentDay = getToday();
                renderTabs();
                renderMeta();
                renderLegend();
                renderDayLabel();
                renderBlocks();
                renderEval();
                renderRules();
                updateGlowBorders();
            })
            .catch(err => {
                document.querySelector('.flex-col').innerHTML +=
                    `<div class="widget widget-rounded" style="padding:16px;color:#ef4444;font-size:0.75rem">&gt; failed to load routine.json — ${err.message}</div>`;
            });
    </script>
    <script src="theme.js"></script>
</body>

</html>
